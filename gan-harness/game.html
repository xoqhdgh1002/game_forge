const keys = {};

  ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right",
  KeyW:"up", KeyS:"down", KeyA:"left", KeyD:"right",
  Space:"action", Enter:"action",
  Tab:"inventory", KeyG:"glossary",
  KeyM:"mute", Escape:"pause",
  Digit1:"c1", Digit2:"c2", Digit3:"c3",
};

window.addEventListener("keydown", (e) => {
  const k = KEY_MAP[e.code];
  if (!k) return;
  // Don't block default for letters that aren't game keys.
  e.preventDefault();
  if (!keys[k]) keyOnce[k] = true;
  keys[k] = true;
  // Hide help overlay on first interaction
  const help = document.getElementById("help");
  if (help && !help.classList.contains("hidden")) help.classList.add("hidden");
}, { passive: false });

window.addEventListener("keyup", (e) => {
  const k = KEY_MAP[e.code];
  if (!k) return;
  e.preventDefault();
  keys[k] = false;
}, { passive: false });

function consume(name) {
  if (keyOnce[name]) { keyOnce[name] = false; return true; }
  return false;
}

// ============================================================
// ===== AUDIO (Web Audio API, procedural pentatonic) =========
// ============================================================
let audioCtx = null;
let muted = false;
try { muted = localStorage.getItem("sjyj_mute") === "1"; } catch(_) {}

function ensureAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { audioCtx = null; }
}

// Pentatonic frequencies (Korean 가야금 vibe)
const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];

function pluck(freq = 440, dur = 0.35, vol = 0.18) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t);
  o.stop(t + dur + 0.05);
}

function sfxStep()    { pluck(180 + Math.random()*40, 0.05, 0.05); }
function sfxTalk()    { pluck(PENTA[2 + Math.floor(Math.random()*4)], 0.14, 0.10); }
function sfxConfirm() { pluck(PENTA[5], 0.20, 0.14); pluck(PENTA[7], 0.30, 0.10); }
function sfxCollect() { pluck(PENTA[4], 0.18, 0.16); setTimeout(()=>pluck(PENTA[6], 0.22, 0.14),80); setTimeout(()=>pluck(PENTA[7], 0.28, 0.12),180); }
function sfxOpen()    { pluck(PENTA[3], 0.12, 0.10); }
function sfxScene()   { pluck(PENTA[0], 0.5, 0.10); setTimeout(()=>pluck(PENTA[2], 0.5, 0.08), 120); setTimeout(()=>pluck(PENTA[4], 0.6, 0.07), 260); }

function toggleMute() {
  muted = !muted;
  try { localStorage.setItem("sjyj_mute", muted ? "1" : "0"); } catch(_) {}
}

// ============================================================
// ===== SPRITE DATA (drawn entirely via fillRect) ============
// ============================================================
// Sprites are arrays-of-strings where each char is a palette index.
// '.' = transparent. Characters are 14×20 logical "pixels" → rendered as 2px blocks → 28×40 on screen
function makeSprite(rows, palette) {
  return { rows, palette, w: rows[0].length, h: rows.length };
}

function drawSprite(ctx, sprite, x, y, scale = PIXEL, flipX = false) {
  const { rows, palette, w, h } = sprite;
  for (let py = 0; py < h; py++) {
    const row = rows[py];
    for (let px = 0; px < w; px++) {
      const ch = row[flipX ? (w - 1 - px) : px];
      if (ch === "." || ch === " ") continue;
      const color = palette[ch];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x + px * scale, y + py * scale, scale, scale);
    }
  }
}

// "!" exclamation (drawn programmatically — not emoji)
function drawExclaim(ctx, x, y, t) {
  const bob = Math.sin(t * 0.008) * 2;
  const px = PIXEL;
  // Yellow bubble background
  ctx.fillStyle = C.gold;
  ctx.fillRect(x - 6, y - 24 + bob, 12, 18);
  ctx.fillStyle = C.ink;
  ctx.fillRect(x - 8, y - 24 + bob, 2, 18);
  ctx.fillRect(x + 6, y - 24 + bob, 2, 18);
  ctx.fillRect(x - 6, y - 26 + bob, 12, 2);
  ctx.fillRect(x - 6, y - 6 + bob, 12, 2);
  // The "!" mark
  ctx.fillRect(x - 1, y - 22 + bob, 2, 10);
  ctx.fillRect(x - 1, y - 10 + bob, 2, 2);
}

  "##############################" + // 15
  "##############################"   // 16
);

// Helper: get tile at (tx, ty) for a given map string
function tileAt(mapStr, tx, ty) {
  if (tx < 0 || ty < 0 || tx >= TILES_W || ty >= TILES_H) return "#";
  return mapStr[ty * TILES_W + tx];
}

function loadInto(scene, spawn) {
  game.scene = scene;
  const s = SCENES[scene];
  game.npcs = s.npcs();
  game.portals = s.portals;
  if (spawn) {
    game.player.x = spawn.x;
    game.player.y = spawn.y;
  } else {
    game.player.x = s.spawn.x;
    game.player.y = s.spawn.y;
  }
  game.player.facing = "down";
  sfxScene();
}

// Show chapter card on first entry to chapter scenes
const cardsShown = new Set();

function maybeShowChapterCard() {
  const s = SCENES[game.scene];
  if (s.id === "hub") return false;
  if (cardsShown.has(s.id)) return false;
  cardsShown.add(s.id);
  let hanja, korean, subtitle;
  if (s.id === "yisu")    { hanja = "易水歌"; korean = "역수의 노래"; subtitle = "刺客列傳 · 형가"; }
  if (s.id === "georok")  { hanja = "破釜沈舟"; korean = "솥을 깨다"; subtitle = "項羽本紀 · 항우"; }
  if (s.id === "hamyang") { hanja = "約法三章"; korean = "세 줄의 법"; subtitle = "高祖本紀 · 유방"; }
  game.cardText = { hanja, korean, subtitle };
  game.cardTimer = game.cardDuration;
  game.state = STATE.CHAPTER_CARD;
  return true;
}

// ============================================================
// ===== DIALOGUE ENGINE =======================================
// ============================================================
function startDialog(npcDialogId) {
  const tree = DIALOGS[npcDialogId];
  if (!tree) return;
  game.dialog = tree;
  game.dialogNodeId = tree.start;
  const node = tree.nodes[tree.start];
  game.dialogText = node.text;
  game.dialogShown = 0;
  game.dialogTimer = 0;
  game.dialogChoiceIdx = 0;
  game.state = STATE.DIALOGUE;
  sfxTalk();
}

function dialogNode() {
  return game.dialog?.nodes[game.dialogNodeId];
}

function advanceDialog() {
  const node = dialogNode();
  if (!node) { game.state = STATE.PLAYING; return; }

  // If text is still typing, complete it.
  if (game.dialogShown < game.dialogText.length) {
    game.dialogShown = game.dialogText.length;
    return;
  }

  // If there are choices, "advance" doesn't apply — wait for 1/2/3
  if (node.choices) return;

  // If action present
  if (node.action === "end") {
    game.dialog = null;
    game.dialogNodeId = null;
    game.state = STATE.PLAYING;
    return;
  }
  if (node.action && node.action.startsWith("award:")) {
    const id = node.action.split(":")[1];
    awardJukgan(id);
    game.dialog = null;
    game.dialogNodeId = null;
    game.state = STATE.PLAYING;
    return;
  }

  // Move to next node
  if (node.next) {
    moveToNode(node.next);
  } else {
    game.dialog = null;
    game.dialogNodeId = null;
    game.state = STATE.PLAYING;
  }
}

function moveToNode(id) {
  game.dialogNodeId = id;
  const node = game.dialog.nodes[id];
  game.dialogText = node.text;
  game.dialogShown = 0;
  game.dialogTimer = 0;
  game.dialogChoiceIdx = 0;
  sfxTalk();
}

function chooseDialog(idx) {
  const node = dialogNode();
  if (!node || !node.choices) return;
  const ch = node.choices[idx];
  if (!ch) return;
  moveToNode(ch.next);
}

function awardJukgan(id) {
  if (game.collected.has(id)) return;
  game.collected.add(id);
  const def = JUKGAN_DEFS.find(j => j.id === id);
  showToast(`죽간 +1 · ${def ? def.subtitle : id}`);
  game.flashTimer = 600;
  sfxCollect();
  // Win condition
  if (game.collected.size >= JUKGAN_DEFS.length) {
    setTimeout(() => {
      game.state = STATE.WIN;
      game.winProgress = 0;
      sfxConfirm();
    }, 900);
  }
}

function showToast(text) {
  game.toast = text;
  game.toastTimer = 2200;
}

// ============================================================
// ===== UPDATE ================================================
// ============================================================
function update(dt) {
  game.t += dt;

  // Boot splash
  if (game.bootTimer > 0) {
    game.bootTimer -= dt;
    return;
  }

  // Ink particles (title screen)
  if (game.state === STATE.TITLE) {
    if (game.inkParticles.length < 30) {
      game.inkParticles.push({
        x: Math.random() * W,
        y: -20,
        vy: 20 + Math.random() * 25,
        size: 1 + Math.floor(Math.random() * 3),
        alpha: 0.2 + Math.random() * 0.4,
      });
    }
    for (const p of game.inkParticles) {
      p.y += p.vy * dt / 1000;
    }
    game.inkParticles = game.inkParticles.filter(p => p.y < H + 20);

    if (consume("up"))   { game.titleIdx = (game.titleIdx + 1) % 2; sfxOpen(); }
    else if (consume("down")) { game.titleIdx = (game.titleIdx + 1) % 2; sfxOpen(); }
    if (consume("action")) {
      ensureAudio();
      sfxConfirm();
      if (game.titleIdx === 0) {
        // Start
        loadInto("hub");
        game.state = STATE.PLAYING;
      } else {
        // Reset progress (already a fresh game). Just start.
        loadInto("hub");
        game.state = STATE.PLAYING;
      }
    }
    return;
  }

  // Mute toggle anywhere
  if (consume("mute")) { toggleMute(); showToast(muted ? "음소거 켬" : "음소거 끔"); }

  // Toast countdown
  if (game.toastTimer > 0) game.toastTimer -= dt;
  if (game.flashTimer > 0) game.flashTimer -= dt;

  // Chapter card state
  if (game.state === STATE.CHAPTER_CARD) {
    game.cardTimer -= dt;
    if (game.cardTimer <= 0 || consume("action")) {
      game.state = STATE.PLAYING;
    }
    return;
  }

  // Transition state
  if (game.state === STATE.TRANSITION) {
    game.transTimer += dt;
    if (game.transPhase === "out" && game.transTimer >= game.transDuration / 2) {
      // Apply target
      if (game.transTarget) {
        loadInto(game.transTarget.scene, game.transTarget.spawn);
        game.transTarget = null;
      }
      game.transPhase = "in";
    }
    if (game.transTimer >= game.transDuration) {
      game.state = STATE.PLAYING;
      game.transTimer = 0;
      game.transPhase = "out";
      // After scene loads, maybe show chapter card
      maybeShowChapterCard();
    }
    return;
  }

  // Inventory overlay
  if (game.state === STATE.INVENTORY) {
    if (consume("inventory") || consume("action") || consume("pause")) {
      game.state = STATE.PLAYING;
      sfxOpen();
    }
    return;
  }

  // Glossary overlay
  if (game.state === STATE.GLOSSARY) {
    if (consume("glossary") || consume("action") || consume("pause")) {
      game.state = STATE.PLAYING;
      sfxOpen();
    }
    return;
  }

  // Win screen
  if (game.state === STATE.WIN) {
    game.winProgress = Math.min(1, game.winProgress + dt / 2400);
    if (consume("action")) {
      // Restart
      game.collected.clear();
      cardsShown.clear();
      game.state = STATE.TITLE;
    }
    return;
  }

  // Dialogue
  if (game.state === STATE.DIALOGUE) {
    // Typewriter
    const node = dialogNode();
    if (node && game.dialogShown < game.dialogText.length) {
      game.dialogTimer += dt;
      const charsPerMs = 30 / 1000; // 30 cps
      const total = Math.floor(game.dialogTimer * charsPerMs);
      if (total > game.dialogShown) {
        game.dialogShown = Math.min(game.dialogText.length, total);
      }
    }
    if (consume("action")) advanceDialog();
    if (consume("c1")) chooseDialog(0);
    if (consume("c2")) chooseDialog(1);
    if (consume("c3")) chooseDialog(2);
    return;
  }

  // PLAYING
  if (game.state === STATE.PLAYING) {

    // Open inventory / glossary
    if (consume("inventory")) { game.state = STATE.INVENTORY; sfxOpen(); return; }
    if (consume("glossary"))  { game.state = STATE.GLOSSARY;  sfxOpen(); return; }

    const speed = 0.16; // pixels per ms (~9.6 px/frame at 60fps)
    let dx = 0, dy = 0;
    if (keys.up)    dy -= 1;
    if (keys.down)  dy += 1;
    if (keys.left)  dx -= 1;
    if (keys.right) dx += 1;

    // Normalize diagonal
    if (dx !== 0 && dy !== 0) {
      const inv = 1 / Math.SQRT2;
      dx *= inv; dy *= inv;
    }

    const oldX = game.player.x, oldY = game.player.y;
    if (dx !== 0 || dy !== 0) {
      game.player.moving = true;
      // Update facing — prioritize the more recent axis
      if (Math.abs(dx) > Math.abs(dy)) {
        game.player.facing = dx < 0 ? "left" : "right";
      } else {
        game.player.facing = dy < 0 ? "up" : "down";
      }
    } else {
      game.player.moving = false;
    }

    // Move with collision (separate axes for wall sliding)
    const newX = game.player.x + dx * speed * dt;
    if (!collidesWithWorld(newX, game.player.y)) {
      game.player.x = newX;
    }
    const newY = game.player.y + dy * speed * dt;
    if (!collidesWithWorld(game.player.x, newY)) {
      game.player.y = newY;
    }

    // Walk animation
    if (game.player.moving) {
      game.player.walkTimer += dt;
      if (game.player.walkTimer > 180) {
        game.player.walkTimer = 0;
        game.player.walkFrame = 1 - game.player.walkFrame;
        // Spawn dust + footstep sfx every leg-swap
        spawnDust(game.player.x, game.player.y + 20);
        sfxStep();
      }
    } else {
      game.player.walkFrame = 0;
    }

    // Update dust particles
    for (const d of game.dust) {
      d.life -= dt;
      d.x += d.vx * dt / 1000;
      d.y += d.vy * dt / 1000;
    }
    game.dust = game.dust.filter(d => d.life > 0);

    // Portal check (auto-trigger when stepping on portal tile)
    for (const p of game.portals) {
      const px = p.tx * TILE + TILE / 2;
      const py = p.ty * TILE + TILE / 2;
      const dxp = game.player.x - px, dyp = game.player.y - py;
      if (Math.abs(dxp) < TILE * 0.6 && Math.abs(dyp) < TILE * 0.7) {
        // Trigger transition
        game.state = STATE.TRANSITION;
        game.transTimer = 0;
        game.transPhase = "out";
        game.transTarget = { scene: p.scene, spawn: p.spawn };
        return;
      }
    }

    // Talk to NPC
    if (consume("action")) {
      const npc = nearestInteractableNPC();
      if (npc) {
        startDialog(npc.dialogId);
      }
    }
  }
}

function spawnDust(x, y) {
  for (let i = 0; i < 3; i++) {
    game.dust.push({
      x: x + (Math.random() - 0.5) * 6,
      y: y + (Math.random() - 0.5) * 2,
      vx: (Math.random() - 0.5) * 6,
      vy: -2 - Math.random() * 6,
      life: 220 + Math.random() * 100,
      lifeMax: 320,
    });
  }
}

function collidesWithWorld(px, py) {
  const map = SCENES[game.scene].map;
  // Player collision box: 20×16 footprint centered on (px, py) bottom area
  const halfW = 9, halfH = 6, footY = 12; // foot is 12px below center
  const corners = [
    [px - halfW, py + footY - halfH],
    [px + halfW, py + footY - halfH],
    [px - halfW, py + footY + halfH],
    [px + halfW, py + footY + halfH],
  ];
  for (const [cx, cy] of corners) {
    const tx = Math.floor(cx / TILE);
    const ty = Math.floor(cy / TILE);
    const t = tileAt(map, tx, ty);
    if (!PASSABLE.has(t)) return true;
  }
  return false;
}

function nearestInteractableNPC() {
  let best = null, bestD = 999999;
  for (const n of game.npcs) {
    const dx = n.x - game.player.x, dy = n.y - game.player.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < 56 * 56 && d2 < bestD) { best = n; bestD = d2; }
  }
  return best;
}

// ============================================================
// ===== RENDER ================================================
// ============================================================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

function clearCanvas(color) {
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, W, H);
}

// --- Tile rendering ---
function drawTile(tx, ty, ch, paletteHint) {
  const x = tx * TILE, y = ty * TILE;
  // Floor base
  if (ch === "." || ch === "F" || ch === "*" || ch === "p" || ch === "_") {
    // parchment floor — but wood plank for hub
    ctx.fillStyle = (ch === "F") ? "#C8A674" : C.parchment;
    ctx.fillRect(x, y, TILE, TILE);
    if (ch === "F") {
      // wood grain lines
      ctx.fillStyle = "#A07A4A";
      ctx.fillRect(x, y, TILE, 2);
      ctx.fillRect(x, y + TILE - 2, TILE, 2);
      ctx.fillStyle = "#8C6638";
      ctx.fillRect(x + 6, y + 4, 2, TILE - 8);
      ctx.fillRect(x + 22, y + 4, 2, TILE - 8);
    }
    if (ch === "p") {
      ctx.fillStyle = C.stoneDk;
      ctx.fillRect(x + 10, y + 18, 4, 3);
      ctx.fillRect(x + 18, y + 8, 3, 3);
    }
    if (ch === "*") {
      ctx.fillStyle = C.gold;
      ctx.fillRect(x + 14, y + 14, 4, 4);
    }
    return;
  }

  // Grass / earth (subtle parchment + ink flecks)
  if (ch === ",") {
    ctx.fillStyle = C.parchment;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = paletteHint?.sub || C.inkSoft;
    ctx.globalAlpha = 0.18;
    // deterministic stipple based on (tx, ty)
    const seed = (tx * 73 + ty * 131) % 7;
    for (let i = 0; i < 3; i++) {
      const sx = ((seed + i * 11) % 28) + 2;
      const sy = ((seed * 3 + i * 7) % 28) + 2;
      ctx.fillRect(x + sx, y + sy, 2, 2);
    }
    ctx.globalAlpha = 1;
    return;
  }

  // Sand (riverbank)
  if (ch === "s") {
    ctx.fillStyle = C.sand;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = "#BFA56C";
    const seed = (tx * 17 + ty * 31) % 5;
    ctx.fillRect(x + seed * 4, y + ((seed + 2) % 5) * 4, 2, 2);
    return;
  }

  // Wall (#) — solid ink-brown brick
  if (ch === "#") {
    ctx.fillStyle = paletteHint?.wall || C.brown;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = C.ink;
    ctx.fillRect(x, y + TILE - 3, TILE, 3);
    ctx.fillRect(x, y, 3, TILE);
    return;
  }

  // Stone wall (X) — large blocks
  if (ch === "X") {
    ctx.fillStyle = C.stone;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = C.stoneDk;
    ctx.fillRect(x, y + TILE - 2, TILE, 2);
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillRect(x, y, 2, TILE);
    ctx.fillRect(x + TILE / 2 - 1, y + 4, 2, TILE - 8);
    return;
  }

  // Roof / scroll wall (r) — for hub backdrop
  if (ch === "r") {
    // Backdrop: hung scroll. Vertical strips of bamboo slips that fill in as 죽간 collected.
    ctx.fillStyle = C.bambooLight;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = C.bambooDark;
    // vertical bamboo segments
    for (let i = 0; i < 3; i++) {
      const sx = x + i * 11 + 2;
      ctx.fillRect(sx, y + 2, 8, TILE - 4);
      // segment dividers
      ctx.fillStyle = C.brown;
      ctx.fillRect(sx, y + 8, 8, 1);
      ctx.fillRect(sx, y + 18, 8, 1);
      ctx.fillStyle = C.bambooDark;
    }
    // Top binding
    ctx.fillStyle = C.brown;
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillRect(x, y + TILE - 2, TILE, 2);
    return;
  }

  // Gate (g) — vermilion stone gate top with hanja
  if (ch === "g") {
    ctx.fillStyle = C.vermilion;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = C.vermilionDk;
    ctx.fillRect(x, y + TILE - 4, TILE, 4);
    ctx.fillStyle = C.gold;
    ctx.fillRect(x + 4, y + 4, TILE - 8, 4);
    return;
  }

  // Water (~) — animated horizontal stripes
  if (ch === "~") {
    const phase = Math.floor(game.t / 200) % 2;
    ctx.fillStyle = C.river;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = C.riverDk;
    // wave lines
    ctx.fillRect(x, y + 6 + phase * 2, TILE, 2);
    ctx.fillRect(x + 6, y + 16 - phase * 2, TILE - 12, 2);
    ctx.fillRect(x, y + 24 + phase * 2, TILE, 2);
    return;
  }

  // Tree (T) — willow at riverbank or pine
  if (ch === "T") {
    // floor under
    ctx.fillStyle = C.parchment;
    ctx.fillRect(x, y, TILE, TILE);
    // trunk
    ctx.fillStyle = C.brown;
    ctx.fillRect(x + 14, y + 18, 4, 12);
    // canopy
    ctx.fillStyle = paletteHint?.sub === C.twilight ? "#5B7A4F" : C.grass;
    ctx.fillRect(x + 6, y + 4, 20, 18);
    ctx.fillStyle = paletteHint?.sub === C.twilight ? "#3F5A36" : C.grassDk;
    ctx.fillRect(x + 10, y + 8, 4, 4);
    ctx.fillRect(x + 18, y + 14, 4, 4);
    return;
  }

  // Path stones (=)
  if (ch === "=") {
    ctx.fillStyle = C.parchmentDker;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = C.parchment;
    ctx.fillRect(x + 4, y + 4, 10, 10);
    ctx.fillRect(x + 18, y + 6, 8, 8);
    ctx.fillRect(x + 6, y + 18, 8, 10);
    ctx.fillRect(x + 18, y + 18, 10, 10);
    return;
  }

  // Banner pole (b) — vermilion banner with gold rim
  if (ch === "b") {
    // floor under
    ctx.fillStyle = C.parchment;
    ctx.fillRect(x, y, TILE, TILE);
    // pole
    ctx.fillStyle = C.brown;
    ctx.fillRect(x + 15, y + 4, 2, TILE - 4);
    // banner cloth
    ctx.fillStyle = C.vermilion;
    ctx.fillRect(x + 17, y + 6, 12, 18);
    ctx.fillStyle = C.gold;
    ctx.fillRect(x + 17, y + 6, 12, 2);
    ctx.fillRect(x + 17, y + 22, 12, 2);
    ctx.fillStyle = C.ink;
    ctx.fillRect(x + 21, y + 10, 4, 2);
    ctx.fillRect(x + 21, y + 14, 4, 2);
    ctx.fillRect(x + 21, y + 18, 4, 2);
    return;
  }

  // Pot (o) — bronze cooking pot
  if (ch === "o") {
    ctx.fillStyle = C.parchment;
    ctx.fillRect(x, y, TILE, TILE);
    // legs
    ctx.fillStyle = C.brown;
    ctx.fillRect(x + 8, y + 24, 3, 6);
    ctx.fillRect(x + 21, y + 24, 3, 6);
    // body
    ctx.fillStyle = C.stoneDk;
    ctx.fillRect(x + 6, y + 10, 20, 16);
    ctx.fillStyle = "#3a2a18";
    ctx.fillRect(x + 6, y + 22, 20, 4);
    // rim
    ctx.fillStyle = C.gold;
    ctx.fillRect(x + 4, y + 8, 24, 3);
    return;
  }

  // Bamboo (B) — for ambient scenes
  if (ch === "B") {
    ctx.fillStyle = C.parchment;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = C.jadeDk;
    ctx.fillRect(x + 12, y + 4, 4, 24);
    ctx.fillRect(x + 18, y + 6, 4, 22);
    ctx.fillStyle = C.jade;
    ctx.fillRect(x + 12, y + 12, 4, 2);
    ctx.fillRect(x + 18, y + 18, 4, 2);
    return;
  }

  // Default: draw parchment
  ctx.fillStyle = C.parchment;
  ctx.fillRect(x, y, TILE, TILE);
}

function renderScene() {
  const s = SCENES[game.scene];

  // Ambient backdrop tint (twilight blue for 易水, vermilion-ish hub, etc.)
  if (s.id === "yisu") {
    // Twilight gradient feel
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#5C6B91");
    grad.addColorStop(0.6, "#7A8AAB");
    grad.addColorStop(1, "#A09877");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  } else if (s.id === "georok") {
    ctx.fillStyle = "#E5C5A8";
    ctx.fillRect(0, 0, W, H);
  } else if (s.id === "hamyang") {
    ctx.fillStyle = "#E5DCB4";
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = C.parchment;
    ctx.fillRect(0, 0, W, H);
  }

  // Render tiles
  for (let ty = 0; ty < TILES_H; ty++) {
    for (let tx = 0; tx < TILES_W; tx++) {
      const ch = tileAt(s.map, tx, ty);
      drawTile(tx, ty, ch, s.palette);
    }
  }

  // Hub: render scroll wall fill state — overlay seal for unlocked slots
  if (s.id === "hub") {
    // Title plaque on the wall
    ctx.fillStyle = C.parchmentDk;
    ctx.fillRect(11 * TILE + 8, 1 * TILE + 8, 8 * TILE - 16, TILE - 16);
    ctx.fillStyle = C.ink;
    ctx.font = "bold 18px 'Noto Serif KR', serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("史 記", 15 * TILE, 1 * TILE + TILE / 2);

    // Scroll wall progress (seals appear over bamboo strips as 죽간 are collected)
    drawScrollWallProgress();

    // Three portal plinths on wood floor (row 5)
    drawPortalGate(5,  5, "易水", "역수");
    drawPortalGate(14, 5, "鉅鹿", "거록");
    drawPortalGate(23, 5, "咸陽", "함양");
  } else {
    // Chapter scenes: draw the back-portal as a small "← 서재" gate
    for (const p of game.portals) {
      drawPortalGate(p.tx, p.ty, "歸", "← 서재로");
    }
  }

  // Sort sprites (NPCs + player) by Y for proper depth
  const sprites = [];
  for (const n of game.npcs) sprites.push({ y: n.y, draw: () => drawNPC(n) });
  sprites.push({ y: game.player.y, draw: drawPlayer });
  sprites.sort((a, b) => a.y - b.y);
  for (const s2 of sprites) s2.draw();

  // Dust particles
  for (const d of game.dust) {
    const a = Math.max(0, d.life / d.lifeMax);
    ctx.globalAlpha = a * 0.6;
    ctx.fillStyle = C.parchmentDker;
    ctx.fillRect(d.x | 0, d.y | 0, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Twilight ambient overlay for 易水
  if (s.id === "yisu") {
    ctx.fillStyle = C.twilight;
    ctx.globalAlpha = 0.18;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  // Flash overlay (collect feedback)
  if (game.flashTimer > 0) {
    const a = game.flashTimer / 600;
    ctx.fillStyle = C.gold;
    ctx.globalAlpha = a * 0.35;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

function drawPortalGate(tx, ty, hanja, korean) {
  const x = tx * TILE, y = ty * TILE;
  // arch
  ctx.fillStyle = C.vermilion;
  ctx.fillRect(x - 4, y, TILE + 8, 6);
  ctx.fillStyle = C.vermilionDk;
  ctx.fillRect(x - 4, y + 4, TILE + 8, 2);
  // gold plaque
  ctx.fillStyle = C.gold;
  ctx.fillRect(x + 2, y + 8, TILE - 4, 16);
  ctx.fillStyle = C.ink;
  ctx.font = "bold 14px 'Noto Serif KR', serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(hanja, x + TILE / 2, y + 16);
  // small Korean caption below (above the floor)
  ctx.font = "10px 'Nanum Gothic', sans-serif";
  ctx.fillStyle = C.ink;
  ctx.fillText(korean, x + TILE / 2, y + 30);
}

function drawScrollWallProgress() {
  // Render three "slots" on the scroll wall corresponding to each chapter
  const slotIds = ["hyeongga", "hangu", "yubang"];
  const slotLabels = ["荊", "項", "劉"];
  const slotColors = [C.twilight, C.vermilion, C.jade];
  for (let i = 0; i < 3; i++) {
    const cx = 7 + i * 8;
    const x = cx * TILE, y = 3 * TILE - 8;
    // base parchment slip
    ctx.fillStyle = C.parchmentDker;
    ctx.fillRect(x, y, TILE * 4, TILE - 4);
    if (game.collected.has(slotIds[i])) {
      // filled with brushed text
      ctx.fillStyle = C.parchment;
      ctx.fillRect(x + 2, y + 2, TILE * 4 - 4, TILE - 8);
      ctx.fillStyle = slotColors[i];
      ctx.fillRect(x + 4, y + 4, TILE * 4 - 8, 4);
      ctx.fillStyle = C.ink;
      ctx.font = "bold 14px 'Noto Serif KR', serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(slotLabels[i], x + TILE * 2, y + (TILE - 4) / 2);
      // vermilion seal in corner
      ctx.fillStyle = C.vermilion;
      ctx.fillRect(x + TILE * 4 - 12, y + TILE - 14, 8, 8);
    } else {
      // sealed
      ctx.fillStyle = C.ink;
      ctx.globalAlpha = 0.4;
      ctx.font = "12px 'Nanum Gothic', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("미수집", x + TILE * 2, y + (TILE - 4) / 2);
      ctx.globalAlpha = 1;
    }
  }
}

function drawPlayer() {
  const p = game.player;
  // Idle bob
  const bob = (!p.moving) ? Math.sin(game.t * 0.004) * 1 : 0;
  const sprite = pickPlayerSprite();
  const flip = (p.facing === "left");
  const baseX = (p.x | 0) - (PLAYER_DOWN_A.w * PIXEL) / 2;
  const baseY = (p.y | 0) - (PLAYER_DOWN_A.h * PIXEL) / 2 + bob;
  // shadow
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect((p.x | 0) - 12, (p.y | 0) + 18, 24, 4);
  drawSprite(ctx, sprite, baseX, baseY, PIXEL, flip);
}

function pickPlayerSprite() {
  const f = game.player.facing;
  const w = game.player.walkFrame;
  if (f === "down") return w === 0 ? PLAYER_DOWN_A : PLAYER_DOWN_B;
  if (f === "up")   return w === 0 ? PLAYER_UP_A   : PLAYER_UP_B;
  return w === 0 ? PLAYER_SIDE_A : PLAYER_SIDE_B; // left or right
}

function drawNPC(n) {
  const sprite = n.sprite;
  // breathing bob
  const bob = Math.sin((game.t + n.x * 7) * 0.0035) * 1;
  const baseX = (n.x | 0) - (sprite.w * PIXEL) / 2;
  const baseY = (n.y | 0) - (sprite.h * PIXEL) / 2 + bob;
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect((n.x | 0) - 14, (n.y | 0) + 18, 28, 4);
  drawSprite(ctx, sprite, baseX, baseY, PIXEL);

  // Exclamation if player is near
  const dx = game.player.x - n.x, dy = game.player.y - n.y;
  if (dx * dx + dy * dy < 56 * 56) {
    drawExclaim(ctx, n.x | 0, baseY, game.t);
  }
}

// ============================================================
// ===== UI OVERLAYS ===========================================
// ============================================================
function renderHUD() {
  const s = SCENES[game.scene];

  // Top-left: chapter band (hanji, ink border, asymmetric — hangs left)
  const bandW = 280;
  ctx.fillStyle = C.parchmentDk;
  ctx.fillRect(0, 0, bandW, 36);
  ctx.fillStyle = C.ink;
  ctx.fillRect(0, 36, bandW, 2);
  ctx.fillRect(bandW, 0, 2, 36);
  // brushed accent line
  ctx.fillStyle = C.vermilion;
  ctx.fillRect(8, 30, 60, 2);
  ctx.fillStyle = C.ink;
  ctx.font = "bold 14px 'Nanum Gothic', sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillText(s.chapter, 14, 14);
  ctx.font = "10px 'Nanum Gothic', sans-serif";
  ctx.fillStyle = C.inkSoft;
  ctx.fillText(s.name, 14, 28);

  // Top-right: 죽간 counter with vermilion seal
  const cx = W - 8, cy = 8, cw = 180, chh = 36;
  ctx.fillStyle = C.parchmentDk;
  ctx.fillRect(cx - cw, cy, cw, chh);
  ctx.fillStyle = C.ink;
  ctx.fillRect(cx - cw - 2, cy, 2, chh);
  ctx.fillRect(cx - cw, cy + chh, cw, 2);

  // Draw 5 (or 3) bamboo slip pixels — fills as collected
  const total = JUKGAN_DEFS.length;
  const got = game.collected.size;
  const slipsX = cx - cw + 12;
  const slipsY = cy + 8;
  for (let i = 0; i < total; i++) {
    const sx = slipsX + i * 14;
    const filled = i < got;
    ctx.fillStyle = filled ? C.bambooDark : C.parchmentDker;
    ctx.fillRect(sx, slipsY, 10, 20);
    if (filled) {
      ctx.fillStyle = C.bambooLight;
      ctx.fillRect(sx + 2, slipsY + 2, 6, 16);
      ctx.fillStyle = C.ink;
      ctx.fillRect(sx + 4, slipsY + 5, 2, 2);
      ctx.fillRect(sx + 4, slipsY + 9, 2, 2);
      ctx.fillRect(sx + 4, slipsY + 13, 2, 2);
    }
  }
  // Count text
  ctx.font = "bold 14px 'Nanum Gothic', sans-serif";
  ctx.fillStyle = C.ink;
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";

function pickSpeakerSeal(speaker) {
  if (!speaker) return "印";
  if (speaker.includes("형가")) return "荊";
  if (speaker.includes("항우")) return "項";
  if (speaker.includes("유방")) return "劉";
  if (speaker.includes("사마천")) return "司";
  return "印";
}

function wrapText(text, x, y, maxW, lineH) {
  const lines = [];
  let line = "";
  for (let i = 0; i < text.length; i++) {
    const test = line + text[i];
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      lines.push(line);
      line = text[i];
    } else {
      line = test;
    }
  }
  if (line.length) lines.push(line);
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], x, y + i * lineH);
  }
}

function renderInventory() {
  // Backdrop
  ctx.fillStyle = "rgba(31,26,20,0.6)";
  ctx.fillRect(0, 0, W, H);

  // Scroll panel — long horizontal scroll feel
  const panelX = 80, panelY = 60, panelW = W - 160, panelH = H - 120;
  // scroll rod left + right
  ctx.fillStyle = C.brown;
  ctx.fillRect(panelX - 24, panelY - 6, 24, panelH + 12);
  ctx.fillRect(panelX + panelW, panelY - 6, 24, panelH + 12);
  ctx.fillStyle = C.gold;
  ctx.fillRect(panelX - 24, panelY - 6, 24, 6);
  ctx.fillRect(panelX - 24, panelY + panelH, 24, 6);
  ctx.fillRect(panelX + panelW, panelY - 6, 24, 6);
  ctx.fillRect(panelX + panelW, panelY + panelH, 24, 6);

  // parchment
  ctx.fillStyle = C.parchment;
  ctx.fillRect(panelX, panelY, panelW, panelH);
  // borders
  ctx.fillStyle = C.ink;
  ctx.fillRect(panelX, panelY, panelW, 2);
  ctx.fillRect(panelX, panelY + panelH - 2, panelW, 2);

  // Header
  ctx.font = "bold 24px 'Noto Serif KR', serif";
  ctx.fillStyle = C.ink;
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.fillText("竹簡 — 죽간", panelX + 24, panelY + 18);
  ctx.fillStyle = C.vermilion;
  ctx.fillRect(panelX + 24, panelY + 50, 90, 3);

  ctx.font = "13px 'Nanum Gothic', sans-serif";
  ctx.fillStyle = C.inkSoft;
  ctx.textAlign = "right";
  ctx.fillText(`${game.collected.size} / ${JUKGAN_DEFS.length}`, panelX + panelW - 24, panelY + 24);

  // Empty state
  if (game.collected.size === 0) {
    ctx.font = "16px 'Nanum Gothic', sans-serif";
    ctx.fillStyle = C.inkSoft;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("아직 모은 죽간이 없어요. 사람들과 이야기해 보세요!", panelX + panelW / 2, panelY + panelH / 2);
  } else {
    // Render each collected jukgan as a vertical bamboo slip
    let i = 0;
    for (const def of JUKGAN_DEFS) {
      if (!game.collected.has(def.id)) continue;
      const slipX = panelX + 32 + i * 92;
      const slipY = panelY + 80;
      const slipW = 80, slipH = 240;
      // slip background
      ctx.fillStyle = C.bambooLight;
      ctx.fillRect(slipX, slipY, slipW, slipH);
      ctx.fillStyle = C.bambooDark;
      ctx.fillRect(slipX, slipY, slipW, 4);
      ctx.fillRect(slipX, slipY + slipH - 4, slipW, 4);
      // segment dividers
      for (let s = 1; s < 4; s++) {
        ctx.fillStyle = C.brown;
        ctx.fillRect(slipX, slipY + s * (slipH / 4), slipW, 2);
      }
      // hanja title (vertical-ish — render character-by-character down)
      ctx.font = "bold 18px 'Noto Serif KR', serif";
      ctx.fillStyle = C.ink;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const hanja = def.title.split(" — ")[1] || def.title;
      for (let k = 0; k < hanja.length; k++) {
        ctx.fillText(hanja[k], slipX + slipW / 2, slipY + 24 + k * 22);
      }
      // vermilion seal at bottom
      ctx.fillStyle = C.vermilion;
      ctx.fillRect(slipX + slipW / 2 - 12, slipY + slipH - 28, 24, 24);
      ctx.fillStyle = C.parchment;
      ctx.font = "bold 12px 'Noto Serif KR', serif";
      ctx.fillText(pickSlipSeal(def.id), slipX + slipW / 2, slipY + slipH - 16);
      i++;
    }

    // Lessons panel on right
    const lx = panelX + 32 + 3 * 92 + 16;
    const ly = panelY + 80;
    ctx.fillStyle = C.parchmentDker;
    ctx.fillRect(lx, ly, panelW - (lx - panelX) - 32, 240);
    ctx.fillStyle = C.ink;
    ctx.font = "bold 16px 'Nanum Gothic', sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    ctx.fillText("배운 것", lx + 14, ly + 12);
    ctx.fillStyle = C.vermilion;
    ctx.fillRect(lx + 14, ly + 36, 50, 2);

    let yy = ly + 50;
    ctx.font = "13px 'Nanum Gothic', sans-serif";
    for (const def of JUKGAN_DEFS) {
      if (!game.collected.has(def.id)) continue;
      ctx.fillStyle = C.vermilion;
      ctx.fillText(def.title, lx + 14, yy);
      yy += 18;
      ctx.fillStyle = C.ink;
      const lessonLines = wrapTextLines(def.lesson, panelW - (lx - panelX) - 60, "13px 'Nanum Gothic', sans-serif");
      for (const ln of lessonLines) {
        ctx.fillText(ln, lx + 14, yy);
        yy += 17;
      }
      yy += 10;
    }
  }

  // Footer hint
  ctx.font = "12px 'Nanum Gothic', sans-serif";
  ctx.fillStyle = C.inkSoft;
  ctx.textAlign = "center";
  ctx.fillText("[Tab / Esc] 닫기", W / 2, H - 36);
}

function pickSlipSeal(id) {
  if (id === "hyeongga") return "荊";
  if (id === "hangu")    return "項";
  if (id === "yubang")   return "劉";
  return "印";
}

function wrapTextLines(text, maxW, font) {
  ctx.font = font;
  const lines = [];
  let line = "";
  for (let i = 0; i < text.length; i++) {
    const test = line + text[i];
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      lines.push(line);
      line = text[i];
    } else {
      line = test;
    }
  }
  if (line.length) lines.push(line);
  return lines;
}

// Draw the brush-style hanja for the title in pixel-fillRect strokes (no font dependency for the visual hook)
function drawBrushSign(ch, cx, cy, size) {
  // We draw a stylized "stamped" panel + the actual character using the loaded font as fallback,
  // BUT with a chunky brush-style background panel that gives it the brush-painted look.
  // Background brush-stroke shape
  ctx.fillStyle = C.ink;
  ctx.fillRect(cx - size / 2 + 8, cy - size / 2, size - 16, size);
  ctx.fillStyle = C.parchment;
  ctx.fillRect(cx - size / 2 + 12, cy - size / 2 + 4, size - 24, size - 8);

  // Vermilion seal in the corner
  ctx.fillStyle = C.vermilion;
  ctx.fillRect(cx + size / 2 - 28, cy + size / 2 - 28, 24, 24);
  ctx.fillStyle = C.parchment;
  ctx.font = "bold 14px 'Noto Serif KR', serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("印", cx + size / 2 - 16, cy + size / 2 - 16);

  // The character itself
  ctx.fillStyle = C.ink;
  ctx.font = `bold ${size - 40}px 'Noto Serif KR', serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(ch, cx, cy);
}

function renderTransition() {
  // Ink wipe sweeping left → right (out) then right → left (in)
  let p = game.transTimer / game.transDuration;
  let x;
  if (game.transPhase === "out") {
    x = (p * 2) * W; // 0 → W in first half
    ctx.fillStyle = C.ink;
    ctx.fillRect(0, 0, x, H);
  } else {
    x = ((p - 0.5) * 2) * W; // 0 → W in second half
    ctx.fillStyle = C.ink;
    ctx.fillRect(x, 0, W - x, H);
  }
}

function renderWin() {
  // Parchment fill
  ctx.fillStyle = C.parchment;
  ctx.fillRect(0, 0, W, H);
  // ink stipple
  ctx.fillStyle = C.parchmentDker;
  for (let i = 0; i < 150; i++) {
    const sx = (i * 71) % W, sy = (i * 113) % H;
    ctx.globalAlpha = 0.18;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.font = "bold 36px 'Noto Serif KR', serif";
  ctx.fillStyle = C.ink;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("史記列傳을 마쳤습니다", W / 2, 80);
  ctx.font = "16px 'Nanum Gothic', sans-serif";
  ctx.fillStyle = C.inkSoft;
  ctx.fillText("어린 사관, 너의 죽간이 사기에 적혔다.", W / 2, 116);

  // Three slips reveal
  const total = JUKGAN_DEFS.length;
  for (let i = 0; i < total; i++) {
    const def = JUKGAN_DEFS[i];
    const slipReveal = Math.max(0, Math.min(1, (game.winProgress - i * 0.18) * 2));
    if (slipReveal <= 0) continue;
    const slipX = W / 2 - (total * 130) / 2 + i * 130 + 10;
    const slipY = 160;
    const slipW = 110, slipH = 220 * slipReveal;
    ctx.fillStyle = C.bambooLight;
    ctx.fillRect(slipX, slipY, slipW, slipH);
    ctx.fillStyle = C.bambooDark;
    ctx.fillRect(slipX, slipY, slipW, 4);
    if (slipReveal >= 0.95) {
      ctx.font = "bold 22px 'Noto Serif KR', serif";
      ctx.fillStyle = C.ink;
      const hanja = def.title.split(" — ")[1] || def.title;
      for (let k = 0; k < hanja.length; k++) {
        ctx.fillText(hanja[k], slipX + slipW / 2, slipY + 28 + k * 26);
      }
      ctx.fillStyle = C.vermilion;
      ctx.fillRect(slipX + slipW / 2 - 14, slipY + slipH - 30, 28, 24);
      ctx.fillStyle = C.parchment;
      ctx.font = "bold 14px 'Noto Serif KR', serif";
      ctx.fillText(pickSlipSeal(def.id), slipX + slipW / 2, slipY + slipH - 18);
    }
  }

  // Lessons learned
  if (game.winProgress > 0.7) {
    const yStart = 410;
    ctx.font = "13px 'Nanum Gothic', sans-serif";
    ctx.textAlign = "center";
    let yy = yStart;
    for (const def of JUKGAN_DEFS) {
      ctx.fillStyle = C.vermilion;
      ctx.fillText(def.title, W / 2, yy);
      ctx.fillStyle = C.ink;
      ctx.fillText(def.lesson, W / 2, yy + 16);
      yy += 38;
    }
  }

  if (game.winProgress >= 1) {
    const blink = (Math.floor(game.t / 400) % 2) === 0;
    if (blink) {
      ctx.font = "bold 14px 'Nanum Gothic', sans-serif";
      ctx.fillStyle = C.ink;
      ctx.textAlign = "center";
      ctx.fillText("[Space] 처음 화면으로", W / 2, H - 24);
    }
  }
}

// ============================================================
// ===== MAIN LOOP =============================================
// ============================================================
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(48, now - lastTime); // clamp big jumps
  lastTime = now;

  try {
    update(dt);

    // Render based on state
    if (game.bootTimer > 0) {
      renderBoot();
    } else if (game.state === STATE.TITLE) {
      renderTitle();
    } else if (game.state === STATE.WIN) {
      renderWin();
    } else if (game.state === STATE.CHAPTER_CARD) {
      // Render scene underneath, then card overlay
      renderScene();
      renderHUD();
      renderChapterCard();
    } else if (game.state === STATE.TRANSITION) {
      renderScene();
      renderHUD();
      renderTransition();
    } else {
      renderScene();
      renderHUD();
      if (game.state === STATE.DIALOGUE) renderDialogue();
      if (game.state === STATE.INVENTORY) renderInventory();
      if (game.state === STATE.GLOSSARY)  renderGlossary();
    }

    renderToast();
  } catch (err) {
    // Avoid crashing the loop. Surface error nicely.
    console.error(err);
    ctx.fillStyle = C.parchment;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = C.vermilion;
    ctx.font = "bold 18px 'Nanum Gothic', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("이런! 잠시 멈췄어요. F5로 다시 시작해 주세요.", W / 2, H / 2);
  }

  requestAnimationFrame(loop);
}

// ============================================================
// ===== BOOT ==================================================
// ============================================================
function fitCanvas() {
  // Maintain 16:9, scale to viewport while preserving pixel-art crispness
  const ratio = W / H;
  const vw = window.innerWidth, vh = window.innerHeight;
  let cw, ch;
  if (vw / vh > ratio) {
    ch = vh;
    cw = Math.floor(ch * ratio);
  } else {
    cw = vw;
    ch = Math.floor(cw / ratio);
  }
  canvas.style.width = cw + "px";
  canvas.style.height = ch + "px";
}
window.addEventListener("resize", fitCanvas);
fitCanvas();

// Initialize hub but stay on title screen
loadInto("hub");
game.state = STATE.TITLE;

// Audio context must be unlocked by a user gesture
window.addEventListener("keydown", ensureAudio, { once: true });
window.addEventListener("click",   ensureAudio, { once: true });
window.addEventListener("click", () => { canvas.focus && canvas.focus(); });

requestAnimationFrame(loop);

</script>
